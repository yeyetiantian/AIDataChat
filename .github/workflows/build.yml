name: Build AIDataChat

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            python: '3.11'
            node: '20'

          - os: macos-latest
            target: macos
            python: '3.11'
            node: '20'

          - os: windows-latest
            target: windows
            python: '3.11'
            node: '20'

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 设置 Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: 执行打包
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version || '1.0.0' }}
        run: python backend/build_package.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: AIDataChat-${{ github.event.inputs.version || '1.0.0' }}-${{ matrix.target }}
          path: backend/package_output/AIDataChat-*.tar.gz
          if-no-files-found: error
          compression-level: 0

  create_release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4

      - name: 创建 Release 并上传附件
        uses: softprops/action-gh-release@v2
        with:
          files: AIDataChat-*/*.tar.gz
          generate_release_notes: true
